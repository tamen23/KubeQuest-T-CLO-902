# kube-linter config for CI (.github/workflows/ci.yml).
# Checks disabled here are documented, accepted trade-offs — see
# docs/SECURITY-REVIEW.md for the reasoning behind each one. Everything else
# uses kube-linter's default check set.
checks:
  doNotAutoAddDefaults: false
  exclude:
    # ingress-nginx must bind host ports 80/443 directly (no cloud LB on this
    # lab cluster) — see docs/SECURITY-REVIEW.md's ingress-nginx section.
    - host-network
    - host-port

    # php:8.2-apache runs as root by necessity (binds :80, chmods storage/ at
    # runtime) — see the comment above podSecurityContext in crementation/values.yaml.
    - run-as-non-root

    # Alloy (log shipper) intentionally tolerates all taints so it runs on
    # every node, including tainted ones — see docs/SECURITY-REVIEW.md.
    - non-existent-service-account
