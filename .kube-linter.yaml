# kube-linter config for CI (.github/workflows/ci.yml).
# Checks disabled here are documented, accepted trade-offs — see the
# README's "Security review" section for the reasoning behind each one.
# Everything else uses kube-linter's default check set.
checks:
  doNotAutoAddDefaults: false
  exclude:
    # ingress-nginx must bind host ports 80/443 directly (no cloud LB on this
    # lab cluster) — see the README's ingress-nginx security note.
    - host-network
    - host-port

    # php:8.2-apache runs as root by necessity (binds :80, chmods storage/ at
    # runtime) — see the comment above podSecurityContext in crementation/values.yaml.
    - run-as-non-root

    # Same root cause as run-as-non-root: the php:8.2-apache app writes to
    # storage/ (logs, cache, sessions) at runtime, so a read-only root
    # filesystem isn't possible without reworking the base image. Accepted
    # trade-off for the app container.
    - no-read-only-root-fs

    # Alloy (log shipper) intentionally tolerates all taints so it runs on
    # every node, including tainted ones — see the README's security review.
    - non-existent-service-account
