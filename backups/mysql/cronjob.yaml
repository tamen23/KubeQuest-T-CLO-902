apiVersion: batch/v1
kind: CronJob
metadata:
  name: mysql-backup
  namespace: crementation
  labels:
    app.kubernetes.io/name: mysql-backup
    app.kubernetes.io/component: backup
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: mysql-backup
        spec:
          restartPolicy: OnFailure

          containers:
          - name: mysql-backup
            image: bitnami/mysql:8.0
            imagePullPolicy: IfNotPresent

            env:
            - name: MYSQL_PWD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-root-password
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: laravel-db
                  key: DB_DATABASE

            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 300m
                memory: 256Mi

            command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              mkdir -p /backup

              mysqldump \
                -h mysql-primary \
                -u root \
                --single-transaction \
                --routines \
                "$DB_DATABASE" \
                > /backup/mysql-$(date +%F-%H-%M-%S).sql

              find /backup -type f -mtime +7 -delete

            volumeMounts:
            - name: backup-storage
              mountPath: /backup

          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: mysql-backup-pvc
