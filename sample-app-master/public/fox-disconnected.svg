<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="fur" x1="0" x2="1">
      <stop offset="0" stop-color="#ff8a36"/>
      <stop offset="1" stop-color="#ff5e1a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="100%" height="100%" fill="#f6fbff"/>

  <!-- disconnected cables -->
  <g transform="translate(120,360)">
    <!-- left cable -->
    <path d="M0 0 C120 -40 220 -20 320 -40" stroke="#2b8cc4" stroke-width="14" fill="none" stroke-linecap="round"/>
    <rect x="312" y="-58" width="36" height="26" rx="3" ry="3" fill="#c9e6f7" stroke="#0b6fa2" stroke-width="2" transform="rotate(-20 330 -46)"/>
    <rect x="312" y="-34" width="16" height="10" rx="1" ry="1" fill="#0b6fa2" transform="rotate(-20 330 -46)"/>

    <!-- right cable -->
    <path d="M520 -20 C420 -10 360 -60 320 -40" stroke="#6aa84f" stroke-width="14" fill="none" stroke-linecap="round"/>
    <rect x="216" y="-82" width="36" height="26" rx="3" ry="3" fill="#e8f7db" stroke="#4b8a2a" stroke-width="2" transform="rotate(10 234 -70)"/>
    <rect x="234" y="-68" width="16" height="10" rx="1" ry="1" fill="#4b8a2a" transform="rotate(10 242 -62)"/>

    <!-- frayed ends -->
    <g transform="translate(330,-52) rotate(-12)">
      <path d="M0 0 l12 -6" stroke="#ffb85c" stroke-width="3" stroke-linecap="round"/>
      <path d="M0 6 l14 2" stroke="#fff3e6" stroke-width="2" stroke-linecap="round"/>
    </g>
    <g transform="translate(230,-70) rotate(8)">
      <path d="M0 0 l-10 6" stroke="#d6ffd0" stroke-width="3" stroke-linecap="round"/>
      <path d="M0 -4 l-12 -2" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- fox -->
  <g transform="translate(400,200) scale(1.2)">
    <!-- body shadow -->
    <ellipse cx="0" cy="170" rx="170" ry="30" fill="#000" opacity="0.06"/>

    <!-- body -->
    <path d="M-120 120 C-90 30 -20 20 0 40 C20 20 90 30 120 120 C80 140 -80 140 -120 120" fill="url(#fur)" filter="url(#shadow)"/>

    <!-- head -->
    <g transform="translate(0,0)">
      <path d="M-60 10 C-70 -30 -10 -80 40 -36 C90 -80 140 -30 120 10 C110 30 80 40 40 32 C0 40 -10 38 -40 32 C-80 28 -110 20 -120 10" fill="url(#fur)"/>

      <!-- inner face -->
      <path d="M-40 12 C-20 -10 10 -8 36 12 C36 26 10 34 -2 34 C-40 34 -56 24 -40 12" fill="#fff8ec"/>

      <!-- eyes -->
      <circle cx="10" cy="6" r="4" fill="#2b2b2b"/>
      <circle cx="-18" cy="6" r="4" fill="#2b2b2b"/>

      <!-- nose -->
      <ellipse cx="4" cy="20" rx="6" ry="4" fill="#231f20"/>

      <!-- ears -->
      <path d="M-70 -12 L-92 -60 L-42 -34 Z" fill="#ff8a36"/>
      <path d="M70 -12 L92 -60 L42 -34 Z" fill="#ff8a36"/>
      <path d="M-78 -30 L-86 -54 L-54 -40 Z" fill="#fff2e6"/>
      <path d="M78 -30 L86 -54 L54 -40 Z" fill="#fff2e6"/>
    </g>

    <!-- curious posture -->
    <g transform="translate(-40,80)">
      <path d="M-20 20 C-10 40 10 56 60 56 C110 56 150 40 160 20" fill="#ff8a36"/>
      <path d="M30 30 C15 50 0 70 0 88" stroke="#ff5e1a" stroke-width="8" stroke-linecap="round" fill="none"/>
    </g>

    <!-- face expression: small tilt toward cables -->
    <g transform="translate(-90,90)">
      <text x="0" y="0" font-family="sans-serif" font-size="18" fill="#3b3b3b">Hmm...</text>
    </g>
  </g>

  <!-- caption -->
  <text x="460" y="560" font-family="sans-serif" font-size="14" fill="#55606a" text-anchor="middle">Firefox can’t connect — fox notices disconnected cables</text>
</svg>
