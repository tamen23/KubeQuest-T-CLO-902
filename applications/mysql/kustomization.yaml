apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: crementation

# Official Bitnami MySQL chart, per the KubeQuest brief ("use official one
# for database"). Credentials come from the mysql-secret Kubernetes Secret,
# which External Secrets Operator populates from Vault
# (see infrastructure/external-secrets/external-secrets.yaml).
#
# With releaseName "mysql" and architecture "replication", the chart exposes:
#   mysql-primary.crementation.svc.cluster.local   (read/write)
#   mysql-read.crementation.svc.cluster.local      (read-only, load-balanced across secondaries)
# The app's DB_HOST Vault value (see laravel-db ExternalSecret) must be set to
# mysql-primary.crementation.svc.cluster.local.
#
# Build with:
#   kustomize build --enable-helm applications/mysql
helmCharts:
  # Bitnami migrated its charts to the OCI registry; the old classic HTTP repo
  # (https://charts.bitnami.com/bitnami) no longer serves pullable 12.x tarballs.
  - name: mysql
    repo: oci://registry-1.docker.io/bitnamicharts
    version: 12.2.4
    releaseName: mysql
    namespace: crementation
    valuesInline:
      auth:
        existingSecret: mysql-secret
        database: app_database
        username: app_user

      architecture: replication

      primary:
        persistence:
          enabled: true
          storageClass: local-path
          size: 5Gi
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1
            memory: 1Gi

      secondary:
        replicaCount: 2
        persistence:
          enabled: true
          storageClass: local-path
          size: 5Gi
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
