name: CI

on:
  push:
    branches: [main, develop, "kubequest-*"]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write # required for uploading Trivy SARIF to the Security tab

jobs:
  build-and-scan-image:
    name: Build app image + scan for CVEs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build crementation app image
        uses: docker/build-push-action@v6
        with:
          context: sample-app-master
          file: sample-app-master/Dockerfile
          push: false
          tags: crementation-app:ci
          load: true

      - name: Scan image with Trivy (SARIF for the Security tab — report all)
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: crementation-app:ci
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0" # this pass only uploads findings; the gate is the next step

      - name: Fail on FIXABLE CRITICAL CVEs
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: crementation-app:ci
          format: table
          severity: CRITICAL
          # ignore-unfixed: the php:8.2-apache base image always carries some
          # upstream CVEs with no fix available — those shouldn't red every run.
          # But a CRITICAL that HAS a fix is our responsibility, so gate on it.
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-results.sarif

      - name: Human-readable summary
        if: always()
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: crementation-app:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"

  lint-manifests:
    name: Lint Kubernetes manifests + Helm charts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Install helm
        uses: azure/setup-helm@v4.3.0

      - name: Render infrastructure/ (helmCharts inflator)
        run: kustomize build --enable-helm --load-restrictor LoadRestrictionsNone infrastructure > rendered-infrastructure.yaml

      - name: Render applications/crementation/base/
        run: kustomize build --enable-helm --load-restrictor LoadRestrictionsNone applications/crementation/base > rendered-crementation.yaml

      - name: Render applications/mysql/
        run: kustomize build --enable-helm --load-restrictor LoadRestrictionsNone applications/mysql > rendered-mysql.yaml

      - name: Install kube-linter
        run: |
          curl -sSL "https://github.com/stackrox/kube-linter/releases/latest/download/kube-linter-linux.tar.gz" | tar xz
          sudo mv kube-linter /usr/local/bin/

      # kube-linter is REPORT-ONLY (|| true): the rendered infra is ~100%
      # third-party charts (Grafana, ArgoCD, node-exporter, cert-manager Jobs,
      # …) whose securityContext/resource defaults we can't change without
      # forking every chart, so gating on them is noise. Findings are still
      # printed for visibility. The blocking security gate is Trivy above
      # (fails on fixable CRITICAL CVEs); this surfaces manifest hygiene.
      - name: Lint rendered manifests (kube-linter, report-only)
        run: |
          kube-linter lint rendered-infrastructure.yaml rendered-crementation.yaml rendered-mysql.yaml \
            --config .kube-linter.yaml || true

      - name: Helm lint (crementation chart)
        run: helm lint crementation/

  network-policy-check:
    name: Validate NetworkPolicy coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Checks the source files directly rather than kustomize-rendered
      # multi-doc YAML — parsing rendered output line-by-line with grep is
      # fragile against field reordering; the source layout (one file per
      # namespace, named after it) is a much more reliable signal.
      - name: Confirm a NetworkPolicy file exists per namespace
        run: |
          missing=0
          for ns in crementation monitoring auth vault external-secrets-system ingress-nginx dashboard argocd; do
            if [ ! -f "infrastructure/network-policies/${ns}.yaml" ]; then
              echo "::error::no infrastructure/network-policies/${ns}.yaml found for namespace $ns"
              missing=1
            elif ! grep -q "namespace: ${ns}$" "infrastructure/network-policies/${ns}.yaml"; then
              echo "::error::infrastructure/network-policies/${ns}.yaml doesn't target namespace $ns"
              missing=1
            fi
          done
          exit $missing

      - name: Confirm infrastructure/kustomization.yaml still references network-policies
        run: |
          if ! grep -q "network-policies" infrastructure/kustomization.yaml; then
            echo "::error::network-policies missing from infrastructure/kustomization.yaml resources"
            exit 1
          fi

  # CD: build + push the app image to Docker Hub, but ONLY on a push to main.
  # This is what makes app code changes (e.g. the /metrics endpoint) actually
  # reach the cluster — the image tag pinned in crementation/values.yaml must
  # match APP_IMAGE_TAG below. On other branches/PRs the build-and-scan-image
  # job above still builds the image (push:false) so CI validates every change;
  # only merges to main publish it.
  #
  # Requires two repo secrets (Settings -> Secrets and variables -> Actions):
  #   DOCKERHUB_USERNAME  — the Docker Hub account (e.g. maxi2)
  #   DOCKERHUB_TOKEN     — a Docker Hub access token (not the password)
  push-app-image:
    name: Build + push app image (main only)
    runs-on: ubuntu-latest
    needs: [build-and-scan-image, lint-manifests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      APP_IMAGE: maxi2/crementation-app
      APP_IMAGE_TAG: v1.1.0 # keep in sync with crementation/values.yaml image.tag
    steps:
      - uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build + push (${{ env.APP_IMAGE_TAG }} + latest)
        uses: docker/build-push-action@v6
        with:
          context: sample-app-master
          file: sample-app-master/Dockerfile
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:${{ env.APP_IMAGE_TAG }}
            ${{ env.APP_IMAGE }}:latest
