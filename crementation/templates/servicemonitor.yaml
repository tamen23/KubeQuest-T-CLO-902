{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "crementation.fullname" . }}
  labels:
    {{- include "crementation.labels" . | nindent 4 }}
    # kube-prometheus-stack's Prometheus selects ServiceMonitors labeled
    # release=<prometheus release name>; without this the app's /metrics
    # endpoint is never scraped.
    release: {{ .Values.serviceMonitor.releaseLabel | default "prometheus" }}
spec:
  selector:
    matchLabels:
      {{- include "crementation.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval | default "15s" }}
{{- end }}
