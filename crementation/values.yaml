replicaCount: 2

# Zero-downtime rolling updates: never take an old pod down until a new one is
# Ready (maxUnavailable: 0), and hold a new pod "available" for 5s after Ready
# so a half-warmed pod doesn't get traffic. Proven by scripts/zero-downtime-test.sh.
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1
minReadySeconds: 5

image:
  repository: maxi2/crementation-app
  # v1.1.0 adds the /metrics endpoint (MetricsController + route) that the
  # ServiceMonitor scrapes. Built + pushed by the push-app-image CI job on
  # merge to main — keep this tag in sync with .github/workflows/ci.yml.
  tag: v1.1.1
  pullPolicy: Always

imagePullSecrets:
  - name: dockerhub-secret

# Startup fix-ups for the php:8.2-apache image (infra-side, NOT app code):
# the image's Apache serves the app root and ignores Laravel's .htaccess, so a
# bare request shows "Index of /" instead of the app. This wraps the normal
# apache2-foreground start with the config fixes that make Laravel serve:
#   - <Directory> AllowOverride All  -> Laravel's public/.htaccess (pretty URLs) works
#   - a2enmod rewrite                -> mod_rewrite for that .htaccess
#   - DirectoryIndex index.php       -> serve Laravel's front controller, not a dir listing
#   - php artisan migrate --force    -> create the app's DB tables on first boot
#   - chmod storage/bootstrap cache  -> Laravel needs these writable
# (Proven fix, previously lived in applications/crementation/base/deployment.yaml.)
command: ["/bin/sh", "-c"]
args:
  - |
    # Apache: serve Laravel's public/ front controller with .htaccess rewrites.
    sed -i '/DocumentRoot/a \ \t<Directory ${APACHE_DOCUMENT_ROOT}>\n\t\tAllowOverride All\n\t\tDirectoryIndex index.php\n\t</Directory>' /etc/apache2/sites-available/000-default.conf
    a2enmod rewrite || true
    # The image bakes `php artisan config:cache` (and route/service caching)
    # at BUILD time into bootstrap/cache/*.php — config.php (Laravel defaults,
    # db "forge", no APP_KEY), routes-v7.php, services.php, packages.php.
    # Laravel reads those cached files and IGNORES every runtime env var while
    # they exist (that's the whole point of caching — it skips re-reading
    # .env/config on every request). Two-part fix, both required:
    #   1. write a REAL .env from the container's env vars — Laravel's env()
    #      helper is designed to read .env, this is the supported path (not
    #      just relying on getenv() reaching every config consumer).
    #   2. `php artisan optimize:clear` — deletes ALL the baked caches (config,
    #      routes, views, services/packages, events), not just config.php, so
    #      everything rebuilds fresh from that .env on the next request.
    { echo "APP_ENV=${APP_ENV:-production}"; echo "APP_DEBUG=${APP_DEBUG:-false}"; \
      echo "APP_KEY=${APP_KEY}"; echo "APP_URL=https://${APP_URL_HOST:-localhost}"; \
      echo "DB_CONNECTION=${DB_CONNECTION:-mysql}"; echo "DB_HOST=${DB_HOST}"; \
      echo "DB_PORT=${DB_PORT:-3306}"; echo "DB_DATABASE=${DB_DATABASE}"; \
      echo "DB_USERNAME=${DB_USERNAME}"; echo "DB_PASSWORD=${DB_PASSWORD}"; \
      echo "LOG_CHANNEL=${LOG_CHANNEL:-stack}"; echo "LOG_STDERR_FORMATTER=${LOG_STDERR_FORMATTER:-}"; \
    } > /var/www/html/.env
    chmod 666 /var/www/html/.env 2>/dev/null || true
    php artisan optimize:clear || true
    # Storage + cache must be writable (Laravel logs/sessions/views).
    chmod -R 777 /var/www/html/storage /var/www/html/bootstrap/cache 2>/dev/null || true
    # Create the app tables in the BACKGROUND (retrying until MySQL is ready),
    # so Apache can start serving immediately and the liveness probe passes —
    # otherwise migrate blocks the container long enough to get killed.
    ( for i in 1 2 3 4 5 6 7 8 9; do php artisan migrate --force && break || sleep 10; done ) &
    exec apache2-foreground

# DB_HOST / DB_DATABASE / DB_USERNAME / DB_PASSWORD / APP_KEY, sourced from
# Vault via the laravel-db ExternalSecret
# (infrastructure/external-secrets/external-secrets.yaml).
envFrom:
  - secretRef:
      name: laravel-db

# Non-secret Laravel runtime config (mirrors sample-app-master/docker-compose.yaml).
env:
  # Apache serves ${APACHE_DOCUMENT_ROOT} (the Dockerfile rewrote its vhost to
  # that variable). It must point at Laravel's public/ dir, or Apache serves
  # the app root and shows a bare "Index of /" directory listing instead of the
  # app. The image sets this via ENV, but we pin it explicitly here so the
  # deployment never runs with it unset/overridden.
  - name: APACHE_DOCUMENT_ROOT
    value: /var/www/html/public
  - name: APP_ENV
    value: production
  - name: APP_DEBUG
    value: "false"
  - name: DB_CONNECTION
    value: mysql
  - name: DB_PORT
    value: "3306"
  # Default Laravel config (sample-app-master/config/logging.php) writes
  # plain-text lines to a file inside the container, which Alloy (tails
  # stdout/stderr only, see infrastructure/monitoring/loki/values-alloy.yaml)
  # never sees. LOG_CHANNEL=stderr + a JSON formatter makes logs both
  # reachable by the log shipper and parseable by the LogQL `| json` filters
  # in infrastructure/monitoring/dashboards/crementation-logs.json.
  - name: LOG_CHANNEL
    value: stderr
  - name: LOG_STDERR_FORMATTER
    value: "Monolog\\Formatter\\JsonFormatter"
  # Off by default — only flip to "true" for the defense demo's failure
  # scripts (see the README's "Defense day runbook"), never in a normal
  # deploy. Enables /api/debug/burn-cpu, /api/debug/leak-memory,
  # /api/debug/crash (sample-app-master/app/Http/Controllers/DebugController.php).
  - name: DEBUG_ENDPOINTS_ENABLED
    value: "false"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# linkerd.io mesh sidecar tuning: keep the proxy's own resource footprint small,
# and skip meshing the MySQL port so DB traffic isn't proxied.
podAnnotations:
  config.linkerd.io/proxy-cpu-request: "50m"
  config.linkerd.io/proxy-memory-request: "64Mi"
  config.linkerd.io/skip-outbound-ports: "3306"

# app.kubernetes.io/managed-by is already emitted by _helpers.tpl's common
# labels; setting it here too produced a duplicate YAML key that broke the
# kustomize helm inflator. Leave empty unless you need genuinely extra labels.
podLabels: {}

# The php:8.2-apache image is DESIGNED to start as root: the entrypoint (and our
# startup args) must delete the root-owned baked config cache, chmod storage/,
# and let Apache bind :80 + fork workers as www-data. runAsUser:0 makes the
# startup command run as root; Apache then drops privilege to www-data itself.
# (runAsNonRoot isn't possible with this base image without rebuilding it.)
podSecurityContext:
  runAsUser: 0

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    # Apache (php:8.2-apache) starts as root then forks workers as the www-data
    # user/group — it needs SETGID/SETUID to do that. Without them the workers
    # crash with "setgid: Operation not permitted" and every request 500s.
    # NET_BIND_SERVICE lets it bind port 80. These three are the minimum the
    # image needs; everything else stays dropped.
    add:
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
      # DAC_OVERRIDE: even as root, `drop: ALL` removes the capability to
      # bypass file permissions — so the startup script can't delete the
      # root-owned baked config.php or write to storage/. Add it back.
      - DAC_OVERRIDE
      - CHOWN
      - FOWNER

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    # See infrastructure/cert-manager/cluster-issuers.yaml: internal-ca works
    # today on the .local hostname below; swap to letsencrypt-prod once this
    # is served from a real domain.
    cert-manager.io/cluster-issuer: internal-ca
  hosts:
    - host: crementation.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: crementation-tls
      hosts:
        - crementation.local

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /
    port: http

readinessProbe:
  httpGet:
    path: /
    port: http

# Scrape the app's own /metrics business metrics into Prometheus (needs the
# Prometheus Operator CRDs from kube-prometheus-stack). releaseLabel must match
# the kube-prometheus-stack release name so the operator selects this monitor.
serviceMonitor:
  enabled: true
  releaseLabel: prometheus
  interval: 15s

# Guards the app against voluntary disruptions (node drain / upgrades). See
# scripts/drain-demo.sh for the live `kubectl drain` demonstration.
podDisruptionBudget:
  enabled: true
  minAvailable: 1

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

volumes: []

volumeMounts: []

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - topologyKey: kubernetes.io/hostname
        labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - crementation
