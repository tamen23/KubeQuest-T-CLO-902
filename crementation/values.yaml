replicaCount: 2

image:
  repository: maxi2/crementation-app
  tag: v1.0.1
  pullPolicy: Always

imagePullSecrets:
  - name: dockerhub-secret

# DB_HOST / DB_DATABASE / DB_USERNAME / DB_PASSWORD / APP_KEY, sourced from
# Vault via the laravel-db ExternalSecret
# (infrastructure/external-secrets/external-secrets.yaml).
envFrom:
  - secretRef:
      name: laravel-db

# Non-secret Laravel runtime config (mirrors sample-app-master/docker-compose.yaml).
env:
  - name: APP_ENV
    value: production
  - name: APP_DEBUG
    value: "false"
  - name: DB_CONNECTION
    value: mysql
  - name: DB_PORT
    value: "3306"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# linkerd.io mesh sidecar tuning: keep the proxy's own resource footprint small,
# and skip meshing the MySQL port so DB traffic isn't proxied.
podAnnotations:
  config.linkerd.io/proxy-cpu-request: "50m"
  config.linkerd.io/proxy-memory-request: "64Mi"
  config.linkerd.io/skip-outbound-ports: "3306"

podLabels:
  app.kubernetes.io/managed-by: Helm

# NOTE: the php:8.2-apache base image runs apache2-foreground as root to bind
# port 80 and its entrypoint chmods storage/ at startup, so runAsNonRoot is not
# safe here without reworking the image (see sample-app-master/Dockerfile).
podSecurityContext: {}

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: crementation.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /
    port: http

readinessProbe:
  httpGet:
    path: /
    port: http

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

volumes: []

volumeMounts: []

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - topologyKey: kubernetes.io/hostname
        labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - crementation
