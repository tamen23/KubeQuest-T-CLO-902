apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# OPA Gatekeeper policy: reject container images tagged :latest (or untagged,
# which defaults to :latest). Referenced from infrastructure/kustomization.yaml
# as ../components/gatekeeper so kustomize can load it as a base directory
# rather than as raw files outside the infrastructure/ root (which the default
# load restrictor forbids).
resources:
  - constrainttemplate-k8sdisallowlatest.yaml
  - constraint-k8sdisallowlatest.yaml
