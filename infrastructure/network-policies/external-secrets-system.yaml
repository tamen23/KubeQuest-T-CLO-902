# Deny-by-default for external-secrets-system, then allow egress to Vault.
#
# IMPORTANT: this operator also needs egress to the Kubernetes API server (to
# write the Secrets it creates) — the API server's ClusterIP is
# cluster-specific (find yours with `kubectl get svc kubernetes -n default`)
# so it isn't hardcoded here. If ExternalSecrets stop reconciling after
# applying this policy, add:
#   - to: [{ipBlock: {cidr: <api-server-clusterip>/32}}]
#     ports: [{protocol: TCP, port: 443}]
# Many CNIs (including Calico, used on this cluster per prior live-state
# evidence) implicitly allow apiserver traffic regardless of NetworkPolicy —
# verify on your specific cluster before assuming this is broken.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: external-secrets-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: external-secrets-system
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-vault
  namespace: external-secrets-system
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
      ports:
        - protocol: TCP
          port: 8200
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: external-secrets-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
