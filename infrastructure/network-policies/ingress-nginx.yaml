# ingress-nginx is the front door — it must accept ingress from anywhere
# (that's its job) but its egress is restricted to the backends it's actually
# configured to proxy to (crementation, dashboard, monitoring, auth, argocd).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: ingress-nginx
spec:
  podSelector: {}
  policyTypes:
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: ingress-nginx
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-backends
  namespace: ingress-nginx
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: crementation
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: dashboard
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: auth
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd
