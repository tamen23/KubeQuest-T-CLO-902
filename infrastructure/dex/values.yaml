# Secrets (oauth2-proxy static-client secret, GitHub OAuth clientID/clientSecret)
# are NOT stored here. They are loaded from the `dex-secrets` Kubernetes Secret
# (see infrastructure/dex/external-secret.yaml), which External Secrets Operator
# populates from Vault at path secret/dex. Dex expands $VAR references in its
# config file against its own process environment (os.ExpandEnv), so mounting
# dex-secrets via envFrom is enough to fill in the values below.
#
# See the README's "Deployment" section for the full secret-bootstrap procedure.
envFrom:
  - secretRef:
      name: dex-secrets

# Dex must be reachable from the USER'S BROWSER, not just in-cluster: OIDC
# login redirects the browser to the issuer URL, so a *.svc.cluster.local
# issuer can never complete a real login. It's exposed at https://dex.local
# through ingress-nginx (TLS via cert-manager) and the issuer matches.
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: internal-ca
  hosts:
    - host: dex.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: dex-tls
      hosts:
        - dex.local

config:
  issuer: https://dex.local

  storage:
    type: memory

  web:
    http: 0.0.0.0:5556

  enablePasswordDB: false

  # oauth2-proxy runs as a single shared instance (infrastructure/oauth2-proxy)
  # sitting behind ingress-nginx's auth-url/auth-signin annotations on every
  # protected host (dashboard.local, grafana via values-prometheus.yaml), so
  # one static client with one canonical redirect URI is enough — oauth2-proxy
  # itself tracks which host the user came from and returns them there.
  staticClients:
    - id: oauth2-proxy
      name: "oauth2-proxy"
      secret: $OAUTH2_PROXY_CLIENT_SECRET
      # https:// because ingress-nginx now terminates TLS on these hosts via
      # cert-manager (internal-ca issuer) — see infrastructure/cert-manager.
      redirectURIs:
        - http://oauth2-proxy.auth.svc.cluster.local/oauth2/callback
        - https://dashboard.local/oauth2/callback
        - https://grafana.local/oauth2/callback
        - https://argocd.local/oauth2/callback

  connectors:
    - type: github
      id: github
      name: GitHub
      config:
        clientID: $GITHUB_CLIENT_ID
        clientSecret: $GITHUB_CLIENT_SECRET
        # Must equal <issuer>/callback and be registered as the Authorization
        # callback URL in the GitHub OAuth app settings.
        redirectURI: https://dex.local/callback
        orgs:
          - name: maxiboole2

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
