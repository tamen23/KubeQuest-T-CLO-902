apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dex-secrets
  namespace: auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  target:
    name: dex-secrets
    creationPolicy: Owner

  data:
    - secretKey: OAUTH2_PROXY_CLIENT_SECRET
      remoteRef:
        key: dex
        property: OAUTH2_PROXY_CLIENT_SECRET

    - secretKey: GITHUB_CLIENT_ID
      remoteRef:
        key: dex
        property: GITHUB_CLIENT_ID

    - secretKey: GITHUB_CLIENT_SECRET
      remoteRef:
        key: dex
        property: GITHUB_CLIENT_SECRET

    # oauth2-proxy's own session-cookie encryption key (NOT the OIDC client
    # secret above) — must be a 16, 24, or 32 byte string. Generate with:
    #   openssl rand -base64 32 | head -c 32
    - secretKey: OAUTH2_PROXY_COOKIE_SECRET
      remoteRef:
        key: dex
        property: OAUTH2_PROXY_COOKIE_SECRET
