apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dex-secrets
  namespace: auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  target:
    name: dex-secrets
    creationPolicy: Owner

  # This one Secret feeds TWO consumers with different key-name expectations:
  #   - Dex (envFrom + $VAR expansion in its config) wants the SCREAMING_CASE
  #     names: OAUTH2_PROXY_CLIENT_SECRET, GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET.
  #   - the oauth2-proxy chart (config.existingSecret) wants kebab-case:
  #     client-id, client-secret, cookie-secret.
  # We emit both sets from the same Vault properties so there's a single
  # source of truth and neither consumer needs a second Secret.
  data:
    # --- consumed by Dex ---
    - secretKey: OAUTH2_PROXY_CLIENT_SECRET
      remoteRef:
        key: dex
        property: OAUTH2_PROXY_CLIENT_SECRET
    - secretKey: GITHUB_CLIENT_ID
      remoteRef:
        key: dex
        property: GITHUB_CLIENT_ID
    - secretKey: GITHUB_CLIENT_SECRET
      remoteRef:
        key: dex
        property: GITHUB_CLIENT_SECRET

    # --- consumed by the oauth2-proxy chart's config.existingSecret ---
    # client-id is a fixed literal (the Dex static client id), the other two
    # mirror the Vault properties above.
    - secretKey: client-id
      remoteRef:
        key: dex
        property: OAUTH2_PROXY_CLIENT_ID
    - secretKey: client-secret
      remoteRef:
        key: dex
        property: OAUTH2_PROXY_CLIENT_SECRET
    # oauth2-proxy's session-cookie encryption key — must be 16, 24, or 32
    # bytes. Generate with: openssl rand -base64 32 | head -c 32
    - secretKey: cookie-secret
      remoteRef:
        key: dex
        property: OAUTH2_PROXY_COOKIE_SECRET
