apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Cluster-wide infrastructure/platform layer (as opposed to the `applications/`
# tree, which holds the crementation app + its database). Renders every
# component's official Helm chart with kustomize's built-in inflator, using
# the values.yaml checked in next to each one, plus the two handwritten
# Gatekeeper policy manifests.
#
# Components have real cross-dependencies that kustomize's flat `helmCharts`
# list does not order for you (Vault must be unsealed before External Secrets
# can read from it; Dex needs its ExternalSecret before it can start). See
# the README's "Deployment" section for the actual apply order used at defense.
#
# Build with:
#   kustomize build --enable-helm infrastructure

resources:
  # Gatekeeper policy lives at repo-root components/, outside this
  # infrastructure/ root — referenced as a base directory (which has its own
  # kustomization.yaml) so kustomize's default load restrictor allows it.
  - ../components/gatekeeper
  - external-secrets/clustersecretstore.yaml
  - external-secrets/external-secrets.yaml
  - dex/external-secret.yaml
  - monitoring/prometheus/rbac.yaml
  - monitoring/dashboards
  # Must apply after the cert-manager helmChart below (CRDs + webhook need to
  # exist first) — see the README's "Deployment" section for the two-pass apply.
  - cert-manager/cluster-issuers.yaml
  # NetworkPolicies are deny-by-default per namespace — they MUST be applied
  # last, after every namespace/pod/service above already exists and
  # namespaces carry their default kubernetes.io/metadata.name label (added
  # automatically by Kubernetes >=1.21, which this cluster is). Applying them
  # first or mid-bootstrap will strand pods that need to reach each other
  # before their allow-rules exist. See the README's "Deployment" section.
  - network-policies

helmCharts:
  - name: cert-manager
    repo: https://charts.jetstack.io
    version: 1.16.2
    releaseName: cert-manager
    namespace: cert-manager
    valuesFile: cert-manager/values.yaml

  - name: ingress-nginx
    repo: https://kubernetes.github.io/ingress-nginx
    version: 4.11.3
    releaseName: ingress-nginx
    namespace: ingress-nginx
    valuesFile: ingress-nginx/values.yaml

  # Vendored under infrastructure/charts/kubernetes-dashboard (committed) —
  # upstream https://kubernetes.github.io/dashboard no longer serves a
  # pullable Helm index, so no repo/version here; the inflator uses the local
  # chart dir directly.
  - name: kubernetes-dashboard
    releaseName: dashboard
    namespace: dashboard
    valuesFile: dashboard/values.yaml

  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: 65.5.1
    releaseName: prometheus
    namespace: monitoring
    valuesFile: monitoring/prometheus/values-prometheus.yaml

  - name: loki
    repo: https://grafana.github.io/helm-charts
    version: 6.16.0
    releaseName: loki
    namespace: monitoring
    valuesFile: monitoring/loki/values-loki.yaml
    skipTests: true # chart's helm-test asserts the canary is enabled; we disabled it

  - name: alloy
    repo: https://grafana.github.io/helm-charts
    version: 0.11.0
    releaseName: alloy
    namespace: monitoring
    valuesFile: monitoring/loki/values-alloy.yaml

  - name: vault
    repo: https://helm.releases.hashicorp.com
    version: 0.28.1
    releaseName: vault
    namespace: vault
    valuesFile: vault/values.yaml

  # 0.17+ is required: earlier charts' CRDs only serve external-secrets.io
  # v1beta1/v1alpha1, but our ClusterSecretStore/ExternalSecret manifests use
  # apiVersion external-secrets.io/v1 (served from 0.17.0 onward).
  - name: external-secrets
    repo: https://charts.external-secrets.io
    version: 0.19.2
    releaseName: external-secrets
    namespace: external-secrets-system
    valuesFile: external-secrets/values.yaml

  - name: dex
    repo: https://charts.dexidp.io
    version: 0.19.1
    releaseName: dex
    namespace: auth
    valuesFile: dex/values.yaml

  # Sits behind ingress-nginx's auth-url/auth-signin annotations on
  # dashboard.local and grafana.local (see dashboard/values.yaml and
  # monitoring/prometheus/values-prometheus.yaml) — this is what actually
  # enforces the auth Dex only issues tokens for. Must be deployed after dex
  # and dex/external-secret.yaml (both provide the OIDC client + secret it needs).
  - name: oauth2-proxy
    repo: https://oauth2-proxy.github.io/manifests
    version: 7.9.0
    releaseName: oauth2-proxy
    namespace: auth
    valuesFile: oauth2-proxy/values.yaml

  - name: gatekeeper
    repo: https://open-policy-agent.github.io/gatekeeper/charts
    version: 3.17.1
    releaseName: gatekeeper
    namespace: gatekeeper-system

  # NOTE: argocd/argocd-apps.yaml (the Application manifests ArgoCD uses to
  # watch this repo) is intentionally NOT in this resources/helmCharts list —
  # it can't exist before ArgoCD's own CRDs do, so it's applied manually,
  # once, right after this first pass. See the README's "ArgoCD" section.
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: 7.7.11
    releaseName: argocd
    namespace: argocd
    valuesFile: argocd/values.yaml
