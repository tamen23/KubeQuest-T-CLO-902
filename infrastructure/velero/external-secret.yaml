# Velero's AWS credentials, built from Vault instead of created by hand.
# ESO assembles the `cloud` file (AWS shared-credentials INI format) that the
# velero chart references via credentials.existingSecret: velero-aws-creds
# (see infrastructure/velero/values.yaml). The keys live at Vault secret/aws.
#
# Keeps the rule intact: not in git -> in Vault. No kubectl create secret, no
# local credentials file.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: velero-aws-creds
  namespace: velero
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: velero-aws-creds
    creationPolicy: Owner
    template:
      data:
        cloud: |
          [default]
          aws_access_key_id={{ .access_key_id }}
          aws_secret_access_key={{ .secret_access_key }}
  data:
    - secretKey: access_key_id
      remoteRef:
        key: aws
        property: AWS_ACCESS_KEY_ID
    - secretKey: secret_access_key
      remoteRef:
        key: aws
        property: AWS_SECRET_ACCESS_KEY
