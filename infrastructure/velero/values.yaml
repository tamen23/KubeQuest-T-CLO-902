# Velero — full cluster backup/restore, beyond the MySQL-only dump CronJob
# (backups/mysql/). Velero snapshots Kubernetes resources (and, with the AWS
# plugin, EBS volumes) into an S3 bucket, so you can restore the whole cluster
# — or a single namespace — onto a fresh cluster.
#
# PREREQUISITES (environment-specific, NOT committed):
#   1. An S3 bucket in your AWS region, e.g. kubequest-velero-<group>.
#   2. AWS credentials with access to it, created as a Secret BEFORE this
#      installs (the chart references it via credentials.existingSecret):
#        kubectl create secret generic velero-aws-creds -n velero \
#          --from-file=cloud=./credentials-velero
#      where ./credentials-velero is:
#        [default]
#        aws_access_key_id=<KEY>
#        aws_secret_access_key=<SECRET>
#   3. Fill in bucket + region below.
# See infrastructure/velero/README.md for the backup/restore commands.

initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.11.0
    volumeMounts:
      - mountPath: /target
        name: plugins

credentials:
  existingSecret: velero-aws-creds

configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: REPLACE-WITH-YOUR-S3-BUCKET
      config:
        region: REPLACE-WITH-YOUR-REGION # e.g. eu-central-1
  volumeSnapshotLocation:
    - name: default
      provider: aws
      config:
        region: REPLACE-WITH-YOUR-REGION

# A daily full-cluster backup, kept 7 days. Add/adjust as needed.
schedules:
  daily-full:
    schedule: "0 3 * * *"
    template:
      ttl: 168h0m0s
      includedNamespaces:
        - "*"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
