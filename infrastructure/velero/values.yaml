# Velero — full cluster backup/restore, beyond the MySQL-only dump CronJob
# (backups/mysql/). Velero snapshots Kubernetes resources (and, with the AWS
# plugin, EBS volumes) into an S3 bucket, so you can restore the whole cluster
# — or a single namespace — onto a fresh cluster.
#
# PREREQUISITE (the ONE thing not committed — credentials):
#   Create the AWS creds Secret BEFORE this installs (the chart references it
#   via credentials.existingSecret). Put your keys in a file `credentials-velero`:
#        [default]
#        aws_access_key_id=<KEY>
#        aws_secret_access_key=<SECRET>
#   then:
#        kubectl create secret generic velero-aws-creds -n velero \
#          --from-file=cloud=./credentials-velero
#        rm credentials-velero   # never commit this file
#
# The S3 bucket below (kubequest-velero-092040680793, eu-west-3) already exists
# — created for this project with public access blocked. See
# infrastructure/velero/README.md for backup/restore commands.

initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.11.0
    volumeMounts:
      - mountPath: /target
        name: plugins

credentials:
  existingSecret: velero-aws-creds

configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: kubequest-velero-092040680793
      config:
        region: eu-west-3
  volumeSnapshotLocation:
    - name: default
      provider: aws
      config:
        region: eu-west-3

# A daily full-cluster backup, kept 7 days. Add/adjust as needed.
schedules:
  daily-full:
    schedule: "0 3 * * *"
    template:
      ttl: 168h0m0s
      includedNamespaces:
        - "*"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
