# `vault-token` (external-secrets-system namespace) must hold a Vault token
# scoped to a read-only policy on secret/*, NOT the Vault root token. Create it
# as part of Vault init/unseal (see the README's "Deployment" section).
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: http://vault.vault.svc.cluster.local:8200
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-token
          key: token
          namespace: external-secrets-system
