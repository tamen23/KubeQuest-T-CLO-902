# How External Secrets Operator authenticates to Vault.
#
# We use Vault's KUBERNETES auth method, not a static token. ESO proves its
# identity with its own pod ServiceAccount token; Vault (configured to trust
# this cluster's API — done once in the bootstrap) validates it and hands back
# a short-lived Vault token that auto-renews. This means there is NO stored
# bootstrap secret anywhere — nothing in git, nothing in GitHub, no local file.
# The rule holds: if a secret isn't in git, it's in Vault; the only thing
# outside Vault is ESO's identity, which Kubernetes issues automatically.
#
# Bootstrap side (personal/bootstrap.sh does this once):
#   vault auth enable kubernetes
#   vault write auth/kubernetes/config kubernetes_host=https://kubernetes.default.svc
#   vault write auth/kubernetes/role/external-secrets \
#       bound_service_account_names=external-secrets \
#       bound_service_account_namespaces=external-secrets-system \
#       policy=external-secrets-read ttl=1h
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: http://vault.vault.svc.cluster.local:8200
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets-system
