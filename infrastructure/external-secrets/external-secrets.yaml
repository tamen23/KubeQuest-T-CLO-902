# Feeds the crementation app container's DB_* and APP_KEY environment
# variables (see crementation/values.yaml -> envFrom, wired in the deployment
# template).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: laravel-db
  namespace: crementation
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  target:
    name: laravel-db
    creationPolicy: Owner

  data:
    - secretKey: DB_HOST
      remoteRef:
        key: secret
        property: DB_HOST

    - secretKey: DB_DATABASE
      remoteRef:
        key: secret
        property: DB_DATABASE

    - secretKey: DB_USERNAME
      remoteRef:
        key: secret
        property: DB_USERNAME

    - secretKey: DB_PASSWORD
      remoteRef:
        key: secret
        property: DB_PASSWORD

    - secretKey: APP_KEY
      remoteRef:
        key: secret
        property: APP_KEY
---
# Feeds the official Bitnami MySQL chart's `auth.existingSecret`
# (see applications/mysql/kustomization.yaml -> helmCharts valuesInline).
# Same Vault path as laravel-db above so there is one source of truth for
# DB credentials; only the key names differ to match what each consumer expects.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mysql-secret
  namespace: crementation
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  target:
    name: mysql-secret
    creationPolicy: Owner

  data:
    - secretKey: mysql-root-password
      remoteRef:
        key: secret
        property: DB_ROOT_PASSWORD

    - secretKey: mysql-password
      remoteRef:
        key: secret
        property: DB_PASSWORD

    # Required by the Bitnami chart in `architecture: replication` mode — the
    # secondaries use this to authenticate the replication user against the
    # primary. Without it, `auth.existingSecret` is missing a key the chart
    # expects and the secondaries never start replicating.
    - secretKey: mysql-replication-password
      remoteRef:
        key: secret
        property: DB_REPLICATION_PASSWORD
---
# The private-registry pull secret, built from Vault instead of created by
# hand. ESO assembles a kubernetes.io/dockerconfigjson Secret from the Docker
# Hub username + token stored at Vault secret/dockerhub. This is what lets the
# crementation pods pull maxi2/crementation-app (private repo) — see
# crementation/values.yaml -> imagePullSecrets: dockerhub-secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dockerhub-secret
  namespace: crementation
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: dockerhub-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"https://index.docker.io/v1/":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: dockerhub
        property: username
    - secretKey: password
      remoteRef:
        key: dockerhub
        property: token
