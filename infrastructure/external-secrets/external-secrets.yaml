# Feeds the crementation app container's DB_* and APP_KEY environment
# variables (see crementation/values.yaml -> envFrom, wired in the deployment
# template).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: laravel-db
  namespace: crementation
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  target:
    name: laravel-db
    creationPolicy: Owner

  data:
    - secretKey: DB_HOST
      remoteRef:
        key: secret
        property: DB_HOST

    - secretKey: DB_DATABASE
      remoteRef:
        key: secret
        property: DB_DATABASE

    - secretKey: DB_USERNAME
      remoteRef:
        key: secret
        property: DB_USERNAME

    - secretKey: DB_PASSWORD
      remoteRef:
        key: secret
        property: DB_PASSWORD

    - secretKey: APP_KEY
      remoteRef:
        key: secret
        property: APP_KEY
---
# Feeds the official Bitnami MySQL chart's `auth.existingSecret`
# (see applications/mysql/kustomization.yaml -> helmCharts valuesInline).
# Same Vault path as laravel-db above so there is one source of truth for
# DB credentials; only the key names differ to match what each consumer expects.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mysql-secret
  namespace: crementation
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  target:
    name: mysql-secret
    creationPolicy: Owner

  data:
    - secretKey: mysql-root-password
      remoteRef:
        key: secret
        property: DB_ROOT_PASSWORD

    - secretKey: mysql-password
      remoteRef:
        key: secret
        property: DB_PASSWORD
