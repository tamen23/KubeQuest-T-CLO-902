grafana:
  # Grafana authenticates to Prometheus/Alertmanager through the same
  # kube-rbac-proxy sidecars everyone else does (see prometheus/alertmanager
  # blocks below) — its own ServiceAccount token is the Bearer credential,
  # granted access via infrastructure/monitoring/prometheus/rbac.yaml.
  # $__file{...} tells Grafana to read the token fresh from the projected
  # ServiceAccount volume on every request, so token rotation is transparent.
  serviceAccount:
    create: true
    name: grafana
    autoMount: true

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          uid: prometheus
          access: proxy
          url: https://prometheus-kube-rbac-proxy.monitoring.svc.cluster.local:9091
          isDefault: true
          jsonData:
            tlsSkipVerify: true
            # GET, not the Grafana default POST: kube-rbac-proxy authorizes via
            # a non-resource-URL SubjectAccessReview that only grants `get`, so
            # a POST query would be 403'd.
            httpMethod: GET
            httpHeaderName1: Authorization
          secureJsonData:
            httpHeaderValue1: "Bearer $__file{/var/run/secrets/kubernetes.io/serviceaccount/token}"
        - name: Alertmanager
          type: alertmanager
          uid: alertmanager
          access: proxy
          url: https://alertmanager-kube-rbac-proxy.monitoring.svc.cluster.local:9094
          jsonData:
            tlsSkipVerify: true
            httpHeaderName1: Authorization
            handleGrafanaManagedAlerts: false
          secureJsonData:
            httpHeaderValue1: "Bearer $__file{/var/run/secrets/kubernetes.io/serviceaccount/token}"
        - name: Loki
          type: loki
          uid: loki # referenced by the crementation-logs dashboard's panels
          access: proxy
          url: http://loki.monitoring.svc.cluster.local:3100
          isDefault: false

  nodeSelector:
    node-role.kubernetes.io/monitoring: monitoring

  persistence:
    enabled: true
    storageClassName: local-path
    size: 5Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Exposed through ingress-nginx, gated by oauth2-proxy/Dex — see
  # infrastructure/oauth2-proxy/values.yaml for what auth-url/auth-signin
  # point at.
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/auth-url: "http://oauth2-proxy.auth.svc.cluster.local/oauth2/auth"
      nginx.ingress.kubernetes.io/auth-signin: "https://$host/oauth2/start?rd=$escaped_request_uri"
      cert-manager.io/cluster-issuer: internal-ca
    hosts:
      - grafana.local
    path: /
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.local

prometheus:
  # kube-rbac-proxy sidecar in front of Prometheus's own UI/API port (9090),
  # per the brief's bonus suggestion ("multi-tenant and authentification to
  # prometheus and loki, via kube-rbac-proxy"). Delegates authorization to
  # the Kubernetes API's SubjectAccessReview — any identity with a valid
  # Kubernetes token AND get/list permission on this Service can query
  # Prometheus directly; everyone else gets 403. This is a second, narrower
  # gate than oauth2-proxy/Dex (which covers Grafana): it protects direct
  # PromQL access for people who bypass Grafana entirely.
  prometheusSpec:
    nodeSelector:
      node-role.kubernetes.io/monitoring: monitoring

    retention: 7d

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi

    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi

    # Prometheus itself only listens on localhost; kube-rbac-proxy is the
    # only container whose port is actually reachable from the Service.
    listenLocal: true

    containers:
      - name: kube-rbac-proxy
        image: quay.io/brancz/kube-rbac-proxy:v0.18.0
        args:
          - --secure-listen-address=0.0.0.0:9091
          - --upstream=http://127.0.0.1:9090/
          - --logtostderr=true
        ports:
          - containerPort: 9091
            name: rbac-https
        resources:
          requests:
            cpu: 20m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi

alertmanager:
  # Same kube-rbac-proxy pattern as Prometheus above, in front of the
  # Alertmanager UI/API port (9093).
  alertmanagerSpec:
    nodeSelector:
      node-role.kubernetes.io/monitoring: monitoring

    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi

    listenLocal: true

    containers:
      - name: kube-rbac-proxy
        image: quay.io/brancz/kube-rbac-proxy:v0.18.0
        args:
          - --secure-listen-address=0.0.0.0:9094
          - --upstream=http://127.0.0.1:9093/
          - --logtostderr=true
        ports:
          - containerPort: 9094
            name: rbac-https
        resources:
          requests:
            cpu: 20m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
