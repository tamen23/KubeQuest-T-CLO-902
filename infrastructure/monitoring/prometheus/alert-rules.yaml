# Custom alert rules for the KubeQuest stack. The `release: prometheus` label
# is what the kube-prometheus-stack Prometheus Operator selects on by default
# (ruleSelector matchLabels release=<releaseName>), so these get loaded into
# Prometheus and evaluated automatically — no extra wiring.
#
# Demo: trigger the app's failure-injection endpoints (scripts/failure-demo.sh)
# and watch KubeQuestPodCrashLooping / KubeQuestAppDown / KubeQuestHPAMaxed
# fire in the Alertmanager UI within a minute or two.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kubequest-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
    - name: kubequest.rules
      rules:
        # A pod restarting repeatedly (the /api/debug/crash + broken-image
        # demos both produce this).
        - alert: KubeQuestPodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="crementation"}[5m]) > 3
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} is crash-looping"
            description: "{{ $labels.pod }} in {{ $labels.namespace }} restarted >3 times in 5m."

        # The crementation app has no ready replicas — it's effectively down.
        - alert: KubeQuestAppDown
          expr: |
            kube_deployment_status_replicas_available{namespace="crementation", deployment="crementation"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "crementation app has zero available replicas"
            description: "No ready pods for the crementation Deployment — the app is unreachable."

        # The HPA has hit its ceiling: it wants to scale further but can't. Good
        # signal during the load-test demo that maxReplicas may be too low.
        - alert: KubeQuestHPAMaxedOut
          expr: |
            kube_horizontalpodautoscaler_status_current_replicas{namespace="crementation"}
              >= kube_horizontalpodautoscaler_spec_max_replicas{namespace="crementation"}
          for: 3m
          labels:
            severity: warning
          annotations:
            summary: "HPA {{ $labels.horizontalpodautoscaler }} is at max replicas"
            description: "Sustained load has pinned the HPA at its maxReplicas ceiling for 3m."

        # A container is being throttled/killed near its memory limit (the
        # /api/debug/leak-memory demo produces OOMKills).
        - alert: KubeQuestContainerOOMKilled
          expr: |
            increase(kube_pod_container_status_last_terminated_reason{namespace="crementation", reason="OOMKilled"}[10m]) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Container in {{ $labels.pod }} was OOMKilled"
            description: "A crementation container hit its memory limit and was OOMKilled."

        # A persistent volume (MySQL / monitoring storage) is filling up.
        - alert: KubeQuestPVCAlmostFull
          expr: |
            (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.persistentvolumeclaim }} is >85% full"
            description: "Persistent volume {{ $labels.persistentvolumeclaim }} in {{ $labels.namespace }} is over 85% used."
