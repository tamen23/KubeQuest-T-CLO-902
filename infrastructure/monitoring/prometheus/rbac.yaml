# kube-rbac-proxy (see values-prometheus.yaml's prometheus/alertmanager
# `containers` blocks), with no --resource-attributes flag set, authorizes
# each request as a non-resource-URL SubjectAccessReview against the
# request's own path — i.e. it asks the API server "can this identity GET
# path /?" using the standard Kubernetes non-resource-URL RBAC rule shape
# (`nonResourceURLs`, not `resources`). Any identity without this binding
# gets 403 straight from kube-rbac-proxy, before the request ever reaches
# Prometheus/Alertmanager.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-rbac-proxy-monitoring-reader
rules:
  - nonResourceURLs: ["*"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: grafana-kube-rbac-proxy-monitoring-reader
subjects:
  - kind: ServiceAccount
    name: grafana
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: kube-rbac-proxy-monitoring-reader
  apiGroup: rbac.authorization.k8s.io
---
# kube-rbac-proxy validates a caller's bearer token by asking the API server
# itself (a TokenReview, then a SubjectAccessReview) -- but making THAT call
# is its own permission, granted by the standard `system:auth-delegator`
# ClusterRole, bound to whatever ServiceAccount the *proxy's own pod* runs
# as (Prometheus's/Alertmanager's/Loki's SA, not Grafana's -- Grafana is the
# caller being checked, not the checker). Confirmed live this was missing
# for all three: every kube-rbac-proxy request 401'd with "tokenreviews...is
# forbidden" until this binding existed, meaning bonus #3 (kube-rbac-proxy
# auth on Prometheus/Alertmanager/Loki) had never actually been verified
# end-to-end before this was added.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-kube-rbac-proxy-auth-delegator
subjects:
  - kind: ServiceAccount
    name: prometheus-kube-prometheus-prometheus
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: system:auth-delegator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alertmanager-kube-rbac-proxy-auth-delegator
subjects:
  - kind: ServiceAccount
    name: prometheus-kube-prometheus-alertmanager
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: system:auth-delegator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: loki-kube-rbac-proxy-auth-delegator
subjects:
  - kind: ServiceAccount
    name: loki
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: system:auth-delegator
  apiGroup: rbac.authorization.k8s.io
---
# Dedicated Services exposing the kube-rbac-proxy sidecar ports, since the
# kube-prometheus-stack chart's built-in Services only expose Prometheus'/
# Alertmanager's own ports (9090/9093), which are now `listenLocal: true`
# and unreachable from outside the pod. Loki's chart has no `listenLocal`
# equivalent, so its raw port (3100) is instead locked down by
# infrastructure/network-policies/monitoring.yaml — this Service just adds
# the reachable path via the sidecar.
#
# Selectors below confirmed against a live cluster (`kubectl -n monitoring
# get pods --show-labels`): app.kubernetes.io/name is prometheus /
# alertmanager / loki respectively, matching the kube-prometheus-stack /
# Prometheus Operator / grafana/loki chart conventions.
apiVersion: v1
kind: Service
metadata:
  name: prometheus-kube-rbac-proxy
  namespace: monitoring
spec:
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: rbac-https
      port: 9091
      targetPort: rbac-https
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-kube-rbac-proxy
  namespace: monitoring
spec:
  selector:
    app.kubernetes.io/name: alertmanager
  ports:
    - name: rbac-https
      port: 9094
      targetPort: rbac-https
---
apiVersion: v1
kind: Service
metadata:
  name: loki-kube-rbac-proxy
  namespace: monitoring
spec:
  selector:
    app.kubernetes.io/name: loki
    app.kubernetes.io/component: single-binary
  ports:
    - name: rbac-https
      port: 3101
      targetPort: rbac-https
