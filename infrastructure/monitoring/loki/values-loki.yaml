deploymentMode: SingleBinary

loki:
  auth_enabled: false

  # Loki 6.x requires an explicit storage backend + schema even in
  # single-binary mode — without these the chart template hits a nil pointer
  # on storage.bucketNames.chunks. Filesystem storage on the persistent
  # volume below is the right choice for a single-node lab deployment.
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

# Chart 6.x's memcached-based chunk/results caches are overkill for a
# single-node lab — disable them so the only heavy Loki workloads are the
# single binary + the lightweight canary. (The canary must stay enabled: the
# chart's validate.yaml template hard-fails the render if it's off.)
chunksCache:
  enabled: false
resultsCache:
  enabled: false

singleBinary:
  replicas: 1

  nodeSelector:
    node-role.kubernetes.io/monitoring: monitoring

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  persistence:
    enabled: true
    storageClass: local-path
    size: 10Gi

  # kube-rbac-proxy sidecar, same pattern as Prometheus/Alertmanager
  # (infrastructure/monitoring/prometheus/values-prometheus.yaml) — per the
  # brief's bonus ("multi-tenant and authentification to prometheus and loki,
  # via kube-rbac-proxy"). Loki's chart has no `listenLocal` equivalent (its
  # own Service always exposes 3100 directly), so the raw port is instead
  # locked down by infrastructure/network-policies/monitoring.yaml (only the
  # rbac-proxy port is reachable, even from other monitoring pods) — the
  # sidecar pattern alone would do nothing if 3100 stayed open to anyone in
  # the namespace.
  extraContainers:
    - name: kube-rbac-proxy
      image: quay.io/brancz/kube-rbac-proxy:v0.18.0
      args:
        - --secure-listen-address=0.0.0.0:3101
        - --upstream=http://127.0.0.1:3100/
        - --logtostderr=true
      ports:
        - containerPort: 3101
          name: rbac-https
      resources:
        requests:
          cpu: 20m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi

backend:
  replicas: 0

read:
  replicas: 0

write:
  replicas: 0

gateway:
  enabled: false
